<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>MundiCodeLens AI</title>

    <link
        rel="stylesheet"
        href="{{styleUri}}"
    />

</head>

<body>

    <div class="container">

        <h1>🚀 MundiCodeLens AI</h1>

        <div class="section">

            <div class="badge">
                SOURCE
            </div>

            <h2>📌 Selected Code</h2>

            <pre><code>{{code}}</code></pre>

        </div>

        <div class="section">

            <div class="badge">
                AI ANALYSIS
            </div>

            <h2>{{panelTitle}}</h2>

            <p class="subtitle">
                {{panelSubtitle}}
            </p>

            <div class="response">
                {{response}}
            </div>

        </div>

    </div>

</body>

</html>
