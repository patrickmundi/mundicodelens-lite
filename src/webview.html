<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1e1e1e;
      color: #ffffff;
      padding: 20px;
    }

    h2 {
      color: #4CAF50;
    }

    .card {
      background: #2d2d2d;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
      line-height: 1.6;
	  border-left: 4px solid #4CAF50;
    }

    pre {
      background: #111;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      color: #00ffcc;
    }

    .section {
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <h2>🧠 MundiCodeLens Lite</h2>

  <div class="section">
    <h3>📌 Code</h3>
    <pre>{{code}}</pre>
  </div>

  <div class="section">
  <h3>💡 Explanation</h3>
  <div class="card" id="output"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
  const raw = `{{response}}`;
  document.getElementById("output").innerHTML = marked.parse(raw);
</script>

</body>
</html>
